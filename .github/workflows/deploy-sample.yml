name: Deploy React Sample to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install library dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Install sample dependencies
        run: npm ci --prefix samples/react-msal-sample

      - name: Build sample
        run: npm run build --prefix samples/react-msal-sample

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEB_APP_DEPLOYMENT }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: samples/react-msal-sample/dist
          skip_app_build: true
          skip_api_build: true

  close-pull-request:
    runs-on: ubuntu-latest
    name: Close Pull Request
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Close Staging Environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEB_APP_DEPLOYMENT }}
          action: close
